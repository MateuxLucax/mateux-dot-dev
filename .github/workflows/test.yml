name: Test

on:
  push:
    branches: ['*']
  pull_request:
    branches: ['*']

permissions:
  contents: read

jobs:
  check-and-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run svelte-check
        run: bun run check

      - name: Build site
        run: bun run build

  e2e:
    runs-on: ubuntu-latest
    needs: check-and-build

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/package.json') }}

      - name: Install Playwright browsers
        run: bunx playwright install --with-deps chromium

      - name: Build site for preview
        run: bun run build

      - name: Start vite preview
        run: |
          bun run preview &
          for i in {1..30}; do
            if curl -sf http://localhost:4173/ > /dev/null 2>&1; then
              echo "Preview server is up!"
              exit 0
            fi
            sleep 1
          done
          echo "Preview server failed to start"
          exit 1

      - name: Run Playwright tests
        run: PLAYWRIGHT_BASE_URL=http://localhost:4173 bunx playwright test

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
